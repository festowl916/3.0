<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semakan Pendaftaran OWL 916</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
      box-sizing: border-box;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #555;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      border-color: #3498db;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #2980b9;
    }
    #message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }
    .error {
      color: #e74c3c;
      font-weight: bold;
    }
    .info-box {
      margin-top: 25px;
      padding: 20px;
      background: #f9f9f9;
      border-left: 5px solid #3498db;
      border-radius: 4px;
      display: none;
    }
    .info-box p {
      margin: 10px 0;
      font-size: 15px;
      color: #444;
      border-bottom: 1px dashed #eee;
      padding-bottom: 5px;
    }
    .info-box strong {
      color: #2c3e50;
      display: inline-block;
      width: 130px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Semakan Pendaftaran OWL 916</h2>
  
  <div class="form-group">
    <label for="ic">Masukkan No. IC Peserta:</label>
    <input type="text" id="ic" placeholder="Contoh: 010012140496 tanpa sengkang">
  </div>
  
  <button onclick="searchIC()">🔍 Semak Pendaftaran</button>
  
  <div id="message"></div>
  
  <div id="infoBox" class="info-box">
    <p><strong>Nama Penuh:</strong> <span id="name">-</span></p>
    <p><strong>Kelab:</strong> <span id="club">-</span></p>
    <p><strong>Kategori & Negeri:</strong> <span id="categoryState">-</span></p>
    <p><strong>Jenis Daftar:</strong> <span id="regType">-</span></p>
    <p><strong>Saiz Baju:</strong> <span id="shirt">-</span></p>
    <p><strong>Catatan Baju:</strong> <span id="shirtNote">-</span></p>
    <p><strong>Status Bayaran:</strong> <span id="paymentStatus">-</span></p>
  </div>
</div>

<script>
const API_URL = "https://docs.google.com/spreadsheets/d/1Ty1A8JviU9DHw5qZN4evLyPPWP-L4npEUnjMorkuzkM/gviz/tq?tqx=out:json";

async function searchIC() {
  let icInput = document.getElementById('ic').value.replace(/[^0-9]/g, '').trim();
  const infoBox = document.getElementById('infoBox');
  const message = document.getElementById('message');

  message.innerHTML = "";
  infoBox.style.display = "none";

  if (!icInput) {
    message.innerHTML = "<div class='error'>Sila masukkan No IC.</div>";
    return;
  }

  let icInputTanpaKosong = icInput;
  if (icInput.startsWith('0')) {
    icInputTanpaKosong = icInput.replace(/^0+/, ''); 
  }

  message.innerHTML = "🔄 Sedang menyemak pendaftaran...";

  try {
    const response = await fetch(API_URL + "&t=" + new Date().getTime());
    const text = await response.text();
    
    const jsonText = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
    const data = JSON.parse(jsonText);
    const rows = data.table.rows;

    let rowTemui = null;

    // 🛠️ ENJIN IMBAKAN PINTAR: Cari IC di MANA-MANA kolum sekalipun (Tak kisah kolum 6 atau 9)
    for (let i = 0; i < rows.length; i++) {
      if (rows[i].c) {
        let barisSempad = false;
        
        // Scan setiap sel dalam baris ini
        for (let j = 0; j < rows[i].c.length; j++) {
          if (rows[i].c[j]) {
            let cellData = rows[i].c[j];
            let valFormatted = cellData.f ? String(cellData.f).replace(/[^0-9]/g, '').trim() : "";
            let valRaw = cellData.v !== null ? String(cellData.v).replace(/[^0-9]/g, '').trim() : "";
            
            if (valRaw.includes('.')) valRaw = valRaw.split('.')[0];

            if (
              valFormatted === icInput || 
              valFormatted === icInputTanpaKosong ||
              valRaw === icInput ||
              valRaw === icInputTanpaKosong
            ) {
              barisSempad = true;
              break;
            }
          }
        }
        
        if (barisSempad) {
          rowTemui = rows[i].c;
          break;
        }
      }
    }

    if (!rowTemui) {
      message.innerHTML = "<div class='error'>❌ No IC tidak dijumpai dalam rekod pendaftaran.</div>";
      return;
    }

    const getVal = (cell) => (cell && cell.v !== null) ? String(cell.v).trim() : "";

    // PAPAR DATA (Susunan Kebal Kalis Ralat Ikut Struktur Asal Wakngoh)
    document.getElementById('name').textContent = getVal(rowTemui[0]) || "-"; 
    document.getElementById('club').textContent = getVal(rowTemui[1]) || "-"; 
    
    // Gabungan Kategori & Negeri automatik dinamik
    const katUmur = rowTemui[2] ? getVal(rowTemui[2]) : "";
    const katBusur = rowTemui[3] ? getVal(rowTemui[3]) : "";
    let negeri = rowTemui[4] ? getVal(rowTemui[4]) : "";
    
    // Backup kalau negeri lari ke kolum sebelah disebabkan perubahan baris
    if(negeri.toUpperCase().includes("TRUE") || negeri.toUpperCase().includes("FALSE") || !isNaN(negeri)) {
      negeri = rowTemui[5] ? getVal(rowTemui[5]) : "";
    }
    
    const gabungKategori = [katUmur, katBusur].filter(Boolean).join(" | ");
    document.getElementById('categoryState').textContent = gabungKategori ? `${gabungKategori} - ${negeri}` : negeri || "-";
    
    // Mengesan Jenis Daftar & Baju secara selamat
    document.getElementById('regType').textContent = getVal(rowTemui[5]) || "-"; 
    
    const saizBaju = getVal(rowTemui[6]);
    if (!saizBaju || saizBaju === "-" || saizBaju.toLowerCase() === "tiada" || saizBaju.toLowerCase().includes("tidak")) {
      document.getElementById('shirt').textContent = "-";
    } else {
      document.getElementById('shirt').textContent = saizBaju;
    }

    document.getElementById('shirtNote').textContent = getVal(rowTemui[7]) || "-"; 

    // Cari status bayar secara dinamik dalam baris tu (Sapu bersih TRUE/FALSE/RUE)
    let statusBayarText = `<span style="color:red; font-weight:bold;">Belum Jelas</span>`;
    for(let k=0; k<rowTemui.length; k++) {
      let isi = getVal(rowTemui[k]).toUpperCase();
      if(isi === "TRUE" || isi.includes("RUE") || isi === "JELAS" || isi === "DAH BAYAR") {
        statusBayarText = `<span style="color:green; font-weight:bold;">Jelas (Dah Bayar)</span>`;
        break;
      }
    }
    document.getElementById('paymentStatus').innerHTML = statusBayarText;

    infoBox.style.display = "block";
    message.innerHTML = "";

  } catch (err) {
    console.error(err);
    message.innerHTML = "<div class='error'>Ralat memuat turun data. Sila pastikan sambungan internet baik.</div>";
  }
}
</script>

</body>
</html>
