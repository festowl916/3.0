<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semakan Pendaftaran OWL 916</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
      box-sizing: border-box;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #555;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      border-color: #3498db;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #2980b9;
    }
    #message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }
    .error {
      color: #e74c3c;
      font-weight: bold;
    }
    .info-box {
      margin-top: 25px;
      padding: 20px;
      background: #f9f9f9;
      border-left: 5px solid #3498db;
      border-radius: 4px;
      display: none;
    }
    .info-box p {
      margin: 10px 0;
      font-size: 15px;
      color: #444;
      border-bottom: 1px dashed #eee;
      padding-bottom: 5px;
    }
    .info-box strong {
      color: #2c3e50;
      display: inline-block;
      width: 130px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Semakan Pendaftaran OWL 916</h2>
  
  <div class="form-group">
    <label for="ic">Masukkan No. IC atau Nama Penuh:</label>
    <input type="text" id="ic" placeholder="Masukkan No IC atau Nama Penuh">
  </div>
  
  <button onclick="searchIC()">🔍 Semak Pendaftaran</button>
  
  <div id="message"></div>
  
  <div id="infoBox" class="info-box">
    <p><strong>Nama Penuh:</strong> <span id="name">-</span></p>
    <p><strong>Kelab:</strong> <span id="club">-</span></p>
    <p><strong>Kategori:</strong> <span id="category">-</span></p>
    <p><strong>Negeri:</strong> <span id="state">-</span></p>
    <p><strong>Jenis Daftar:</strong> <span id="regType">-</span></p>
    <p><strong>Status Bayaran:</strong> <span id="paymentStatus">-</span></p>
    <p><strong>Saiz Baju:</strong> <span id="shirt">-</span></p>
    <p><strong>Catatan Baju:</strong> <span id="shirtNote">-</span></p>
  </div>
</div>

<script>
const API_URL = "https://docs.google.com/spreadsheets/d/1Ty1A8JviU9DHw5qZN4evLyPPWP-L4npEUnjMorkuzkM/gviz/tq?tqx=out:json";

async function searchIC() {
  let userInput = document.getElementById('ic').value.trim();
  const infoBox = document.getElementById('infoBox');
  const message = document.getElementById('message');

  message.innerHTML = "";
  infoBox.style.display = "none";

  if (!userInput) {
    message.innerHTML = "<div class='error'>Sila masukkan No IC atau Nama Penuh.</div>";
    return;
  }

  // Tentukan jenis carian (Jika input mengandungi nombor, ia adalah carian IC)
  let IsCarianIC = /[0-9]/.test(userInput);
  
  let icInput = "";
  let icInputTanpaKosong = "";
  let namaInput = "";

  if (IsCarianIC) {
    icInput = userInput.replace(/[^0-9]/g, '').trim();
    icInputTanpaKosong = icInput;
    if (icInput.startsWith('0') && icInput.length === 12) {
      icInputTanpaKosong = icInput.substring(1);
    }
  } else {
    namaInput = userInput.toLowerCase().replace(/\s+/g, ''); // Buang space & lower case untuk carian nama yang tepat
  }

  message.innerHTML = "🔄 Sedang menyemak pendaftaran...";

  try {
    const response = await fetch(API_URL + "&t=" + new Date().getTime());
    const text = await response.text();
    
    const jsonText = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
    const data = JSON.parse(jsonText);
    const rows = data.table.rows;

    let rowTemui = null;
    const COL_NAMA = 0; // Kolum A
    const COL_IC = 9;   // Kolum J

    for (let i = 0; i < rows.length; i++) {
      if (rows[i].c) {
        
        if (IsCarianIC) {
          // 🛠️ LOGIK CARIAN IC (Kalis format saintifik / perpuluhan Google Sheet)
          if (rows[i].c[COL_IC]) {
            let cell = rows[i].c[COL_IC];
            let icRaw = cell.v !== null ? String(cell.v).split('.')[0].replace(/[^0-9]/g, '').trim() : "";
            let icFormatted = cell.f ? String(cell.f).replace(/[^0-9]/g, '').trim() : "";
            
            if (icRaw === icInput || icFormatted === icInput || icRaw === icInputTanpaKosong || icFormatted === icInputTanpaKosong) {
              rowTemui = rows[i].c;
              break;
            }
          }
        } else {
          // 🛠️ LOGIK CARIAN NAMA
          if (rows[i].c[COL_NAMA] && rows[i].c[COL_NAMA].v !== null) {
            let namaSheet = String(rows[i].c[COL_NAMA].v).toLowerCase().replace(/\s+/g, '');
            // Menggunakan includes supaya taip nama pendek (contoh: "Arfa") pun boleh jumpa nama penuh
            if (namaSheet.includes(namaInput)) {
              rowTemui = rows[i].c;
              break;
            }
          }
        }

      }
    }

    if (!rowTemui) {
      message.innerHTML = IsCarianIC 
        ? "<div class='error'>❌ No IC tidak dijumpai dalam rekod pendaftaran.</div>" 
        : "<div class='error'>❌ Nama peserta tidak dijumpai dalam rekod pendaftaran.</div>";
      return;
    }

    const getVal = (cell) => (cell && cell.v !== null) ? String(cell.v).trim() : "";

    // ISI DATA PESERTA (100% SUSUNAN ASAL ABANG YANG BETUL)
    document.getElementById('name').textContent = getVal(rowTemui[0]) || "-"; 
    document.getElementById('club').textContent = getVal(rowTemui[1]) || "-"; 
    
    const katUmur = rowTemui[2] ? getVal(rowTemui[2]) : "";
    const katBusur = rowTemui[3] ? getVal(rowTemui[3]) : "";
    const gabungKategori = [katUmur, katBusur].filter(Boolean).join(" | ");
    document.getElementById('category').textContent = gabungKategori || "-";
    
    document.getElementById('state').textContent = getVal(rowTemui[4]) || "-"; 
    document.getElementById('regType').textContent = getVal(rowTemui[5]) || "-"; 
    
    // Status Bayar
    const bayar = getVal(rowTemui[8]).toUpperCase();
    if (bayar === "TRUE") {
      document.getElementById('paymentStatus').innerHTML = `<span style="color:green; font-weight:bold;">Jelas</span>`;
    } else {
      document.getElementById('paymentStatus').innerHTML = `<span style="color:red; font-weight:bold;">Belum Jelas</span>`;
    }

    // Saiz Baju
    const saizBaju = getVal(rowTemui[6]);
    if (!saizBaju || saizBaju === "-" || saizBaju.toLowerCase() === "tiada" || saizBaju.toLowerCase().includes("tidak")) {
      document.getElementById('shirt').textContent = "-";
    } else {
      document.getElementById('shirt').textContent = saizBaju;
    }

    document.getElementById('shirtNote').textContent = getVal(rowTemui[7]) || "-"; 

    infoBox.style.display = "block";
    message.innerHTML = "";

  } catch (err) {
    console.error(err);
    message.innerHTML = "<div class='error'>Ralat memuat turun data. Sila pastikan sambungan internet baik.</div>";
  }
}
</script>

</body>
</html>
