<script>
const API_URL = "https://docs.google.com/spreadsheets/d/1Ty1A8JviU9DHw5qZN4evLyPPWP-L4npEUnjMorkuzkM/gviz/tq?tqx=out:json";

async function search() {
  let val = document.getElementById('ic').value.trim();
  const infoBox = document.getElementById('infoBox');
  const msg = document.getElementById('message');

  msg.innerHTML = "🔄 Mencari...";
  infoBox.style.display = "none";

  try {
    const res = await fetch(API_URL + "&t=" + new Date().getTime());
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
    const rows = json.table.rows;

    let isIC = /[0-9]/.test(val);
    
    let found = rows.find(r => {
      // Pastikan baris ada data (A=0, F=5)
      if (!r.c || !r.c[0]) return false;
      
      let icSheet = r.c[5] ? String(r.c[5].v || "").split('.')[0].replace(/[^0-9]/g, '').trim() : "";
      let namaSheet = String(r.c[0].v || "").toLowerCase().trim();
      let inputBersih = val.replace(/[^0-9]/g, '').trim();

      if (isIC) return icSheet.includes(inputBersih);
      return namaSheet.includes(val.toLowerCase().trim());
    });

    if (found) {
      const get = (i) => (found.c[i] && found.c[i].v !== null) ? String(found.c[i].v).trim() : "-";
      
      // MAPPING TEPAT IKUT GAMBAR:
      document.getElementById('name').textContent = get(0);    // A: Nama
      document.getElementById('club').textContent = get(1);    // B: Kelab
      document.getElementById('category').textContent = get(2); // C: Kategori
      document.getElementById('state').textContent = get(4);   // E: Negeri
      document.getElementById('regType').textContent = get(6); // G: Jenis Daftar
      
      // I: Status Bayar (J dalam gambar)
      const pay = get(9).toUpperCase(); 
      document.getElementById('paymentStatus').innerHTML = (pay === "TRUE") ? 
        `<span style="color:green; font-weight:bold;">Jelas</span>` : `<span style="color:red; font-weight:bold;">Belum Jelas</span>`;
      
      document.getElementById('shirt').textContent = get(7);   // H: Saiz Baju
      document.getElementById('shirtNote').textContent = "-";  // Tiada catatan baju khusus

      infoBox.style.display = "block";
      msg.innerHTML = "";
    } else {
      msg.innerHTML = "<div class='error'>❌ Tidak dijumpai.</div>";
    }
  } catch (e) {
    msg.innerHTML = "<div class='error'>Ralat teknikal.</div>";
  }
}
</script>
