<script>
const API_URL = "https://docs.google.com/spreadsheets/d/1Ty1A8JviU9DHw5qZN4evLyPPWP-L4npEUnjMorkuzkM/gviz/tq?tqx=out:json";

async function searchIC() {
  let userInput = document.getElementById('ic').value.trim();
  const infoBox = document.getElementById('infoBox');
  const message = document.getElementById('message');

  message.innerHTML = "";
  infoBox.style.display = "none";

  if (!userInput) {
    message.innerHTML = "<div class='error'>Sila masukkan No IC atau Nama Penuh.</div>";
    return;
  }

  let IsCarianIC = /[0-9]/.test(userInput);
  let icInput = userInput.replace(/[^0-9]/g, '').trim();
  let namaInput = userInput.toLowerCase().replace(/\s+/g, '');

  message.innerHTML = "🔄 Sedang menyemak...";

  try {
    const response = await fetch(API_URL + "&t=" + new Date().getTime());
    const text = await response.text();
    const jsonText = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
    const data = JSON.parse(jsonText);
    const rows = data.table.rows;

    let rowTemui = null;
    const COL_NAMA = 0; // Kolum B
    const COL_IC = 4;   // Kolum F (Indeks 4)

    for (let i = 0; i < rows.length; i++) {
      if (rows[i].c) {
        if (IsCarianIC) {
          if (rows[i].c[COL_IC]) {
            let icSheet = String(rows[i].c[COL_IC].v || "").split('.')[0].replace(/[^0-9]/g, '').trim();
            if (icSheet === icInput) {
              rowTemui = rows[i].c;
              break;
            }
          }
        } else {
          if (rows[i].c[COL_NAMA] && rows[i].c[COL_NAMA].v !== null) {
            let namaSheet = String(rows[i].c[COL_NAMA].v).toLowerCase().replace(/\s+/g, '');
            if (namaSheet.includes(namaInput)) {
              rowTemui = rows[i].c;
              break;
            }
          }
        }
      }
    }

    if (!rowTemui) {
      message.innerHTML = "<div class='error'>❌ Tiada rekod dijumpai.</div>";
      return;
    }

    const getVal = (cell) => (cell && cell.v !== null) ? String(cell.v).trim() : "-";

    // MAPPING BARU IKUT SUSUNAN QUERY (B,C,D,E,F,G,I,J,K,N)
    document.getElementById('name').textContent = getVal(rowTemui[0]); // B
    document.getElementById('club').textContent = getVal(rowTemui[1]); // C
    document.getElementById('category').textContent = getVal(rowTemui[2]); // D
    document.getElementById('state').textContent = getVal(rowTemui[3]); // E
    // F (IC) kita tak paparkan sebab dia dah tahu
    document.getElementById('regType').textContent = getVal(rowTemui[5]); // G
    
    // Status Bayar (Col I = indeks 6)
    const bayar = getVal(rowTemui[6]).toUpperCase();
    document.getElementById('paymentStatus').innerHTML = (bayar === "TRUE") ? 
      `<span style="color:green; font-weight:bold;">Jelas</span>` : `<span style="color:red; font-weight:bold;">Belum Jelas</span>`;

    document.getElementById('shirt').textContent = getVal(rowTemui[7]); // J
    document.getElementById('shirtNote').textContent = getVal(rowTemui[8]); // K

    infoBox.style.display = "block";
    message.innerHTML = "";

  } catch (err) {
    message.innerHTML = "<div class='error'>Ralat memuat turun data.</div>";
  }
}
</script>
